    background: radial-gradient(circle, rgba(255, 140, 100, 0.1) 0%, rgba(0,0,0,0) 70%);

    left: -20%;
    z-index: -1;

    pointer-events: none;

<script>
  (function() {
    const card = document.querySelector('.horizon-card');
    if (!card) return;
    let bounds = card.getBoundingClientRect();
    function updateBounds() { bounds = card.getBoundingClientRect(); }
    window.addEventListener('resize', updateBounds);
    updateBounds();

    const spotlightDiv = document.createElement('div');
    spotlightDiv.style.position = 'absolute';
    spotlightDiv.style.top = '0';
    spotlightDiv.style.left = '0';
    spotlightDiv.style.width = '100%';
    spotlightDiv.style.height = '100%';
    spotlightDiv.style.borderRadius = '48px';
    spotlightDiv.style.pointerEvents = 'none';
    spotlightDiv.style.background = 'radial-gradient(circle at 0% 0%, rgba(255,150,100,0), rgba(0,0,0,0))';
    spotlightDiv.style.transition = 'background 0.1s ease';
    spotlightDiv.style.zIndex = '3';
    card.style.position = 'relative';
    card.appendChild(spotlightDiv);

    card.addEventListener('mousemove', (e) => {
      const x = e.clientX - bounds.left;
      const y = e.clientY - bounds.top;
      const percentX = (x / bounds.width) * 100;
      const percentY = (y / bounds.height) * 100;
      spotlightDiv.style.background = `radial-gradient(circle at ${percentX}% ${percentY}%, rgba(255, 130, 90, 0.12) 0%, rgba(0,0,0,0) 65%)`;
    });
    card.addEventListener('mouseleave', () => {
      spotlightDiv.style.background = 'radial-gradient(circle at 0% 0%, rgba(255,150,100,0), rgba(0,0,0,0))';
    });

    card.addEventListener('mousemove', (e) => {
      const xRel = (e.clientX - bounds.left) / bounds.width - 0.5;
      const yRel = (e.clientY - bounds.top) / bounds.height - 0.5;
      const rotateY = xRel * 2;
      const rotateX = yRel * -2;
      card.style.transform = `perspective(1200px) translateY(-5px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
      card.style.transition = 'transform 0.08s linear';
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(1200px) translateY(0) rotateX(0deg) rotateY(0deg) scale(1)';
      card.style.transition = 'transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s';
    });
  })();
</script>
